# Configuration 1: Conservative DeFi Agent
# A conservative DeFi agent prioritizes safety over performance,
# suitable for managing significant value with minimal risk tolerance.

agent_config:
  name: "conservative_defi_agent"
  version: "1.0.0"

  custody:
    type: "smart_contract_wallet"
    implementation: "safe"
    threshold: "2-of-3"
    signers:
      - type: "hardware_wallet"
      - type: "mpc_shard"
      - type: "human_backup"

  policy:
    max_transaction_value: "10000 USD"
    daily_limit: "50000 USD"
    allowed_protocols:
      - "uniswap_v3"
      - "aave_v3"
      - "compound_v3"
    allowed_actions:
      - "swap"
      - "supply"
      - "withdraw"
    blocked_actions:
      - "borrow"
      - "leverage"

  execution:
    simulation_required: true
    human_approval_threshold: "5000 USD"
    mev_protection: "flashbots_protect"
    max_slippage: "0.5%"

  monitoring:
    alert_channels:
      - "email"
      - "slack"
    anomaly_detection: true
    automatic_pause_conditions:
      - "daily_loss > 5%"
      - "failed_transactions > 3"
